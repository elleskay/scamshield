app: scamshield
version: 1
# MVP scope: the citizen-facing check-and-report spine that is shippable without
# device-native work.
#   IN  - check a message for scams, see a verdict; report a scam; async intake
#         via SQS; push when a report is marked a scam; input validation; no
#         secrets in the bundle.
#   OUT (Phase 2, deferred) - native call blocking / identification and SMS
#         filtering (iOS Call Directory + Message Filter, Android
#         CallScreeningService). These cannot be done in JS and require signed
#         real-device verification; they get verify: native requirements later.
#   MVP auth is minimal: checks are anonymous; a report carries an opaque device
#         token. Real account auth is deferred.
requirements:
  - id: SCAM-CHECK-001
    title: User can check a suspicious message and see a verdict
    category: functional
    verify: e2e
    platforms: [ios, android]
    severity: high
    given: the user is on the Check screen
    when: they paste a message with a link and a lure word and tap Check
    then: a SCAM or SUSPICIOUS verdict is shown with a short reason
    tags: [check]

  - id: SCAM-CHECK-002
    title: An ordinary message is reported clean
    category: data
    verify: unit
    severity: medium
    given: the offline classifier
    when: it scores a message with no links or pressure language
    then: it returns a CLEAN verdict

  - id: SCAM-CHECK-003
    title: Check button is disabled until a message is entered
    category: ui
    verify: component
    severity: medium
    given: the Check screen just rendered with an empty input
    when: no text has been entered
    then: the Check button is disabled, and enables once text is present

  - id: SCAM-CLASSIFY-001
    title: Link plus lure is classified as scam
    category: data
    verify: unit
    severity: high
    given: the classifier heuristic
    when: it scores a message containing both a URL and an urgency lure
    then: it returns verdict scam with score >= 0.8

  - id: SCAM-API-001
    title: The check endpoint classifies a message
    category: functional
    verify: integration
    severity: high
    given: the running API
    when: a client POSTs a message to /reports/check
    then: it responds 200 with a verdict, score, and reason

  - id: SCAM-API-002
    title: The check endpoint rejects invalid input
    category: security
    verify: integration
    severity: high
    given: the running API with validation enabled
    when: a client POSTs an empty body or an unknown field to /reports/check
    then: it responds 400 and does not process the request

  - id: SCAM-REPORT-001
    title: A user can report a flagged message and gets a confirmation
    category: functional
    verify: e2e
    platforms: [ios, android]
    severity: critical
    given: a user viewing a SCAM or SUSPICIOUS verdict
    when: they submit it as a report
    then: the API enqueues it, returns a report id, and the app shows a confirmation
    tags: [report, journey]

  - id: SCAM-REPORT-002
    title: The report-intake consumer processes a report idempotently
    category: data
    verify: integration
    severity: high
    given: a report message on the intake queue
    when: the consumer processes it (including a duplicate delivery)
    then: it classifies and persists exactly once, keyed on the report id

  - id: SCAM-PUSH-001
    title: The reporter is notified when an admin marks their report a scam
    category: functional
    verify: integration
    severity: high
    given: a submitted report with a registered device token
    when: an admin verifies it as a scam
    then: a push notification is sent to that device token (and not before review)

  - id: SCAM-SEC-001
    title: No secrets are shipped in the mobile bundle
    category: security
    verify: manual
    severity: critical
    given: a release build of the app
    when: the bundle is inspected
    then: no API keys or signing secrets are present, only EXPO_PUBLIC_ values

  # Phase 2: Check Call (suspicious phone numbers). Mirrors the real ScamShield
  # "Check Call" feature: a number is a known scam, a verified government caller,
  # or unknown.
  - id: SCAM-CALL-001
    title: The check-number endpoint classifies a phone number
    category: functional
    verify: integration
    severity: high
    given: the running API
    when: a client POSTs a number to /numbers/check
    then: it responds 200 with a verdict, score, reason, and isVerifiedCaller; the blocklist endpoint lists known scam numbers
    tags: [call]

  - id: SCAM-CALL-002
    title: Known scam and verified-caller numbers are classified
    category: data
    verify: unit
    severity: high
    given: the offline number heuristic
    when: it classifies a seeded scam number and a seeded government number
    then: the scam number returns verdict scam and the government number returns clean with isVerifiedCaller true

  - id: SCAM-CALL-003
    title: Number mode shows a verdict and marks verified callers
    category: ui
    verify: component
    severity: medium
    given: the Check screen switched to Number mode
    when: the user checks a verified government number
    then: a verdict card is shown with a verified-caller badge

  - id: SCAM-CALL-004
    title: User can check a suspicious phone number and see a verdict
    category: functional
    verify: e2e
    platforms: [ios, android]
    severity: high
    given: the user is on the Check screen in Number mode
    when: they enter a known scam number and tap Check
    then: a scam verdict is shown
    tags: [call, journey]

  # Phase 2: My Reports. A device can see its own reports and their verification
  # status (the "push when authorities mark it scam" loop, made visible).
  - id: SCAM-REPORT-003
    title: A device can list its own reports with status
    category: functional
    verify: integration
    severity: high
    given: the running API and a device that submitted a report
    when: the device GETs /reports with its device token
    then: it receives its reports as pending with the machine suggestedVerdict, and cannot see other devices' reports
    tags: [report]

  - id: SCAM-REPORT-004
    title: A submitted report appears under My Reports with its status
    category: functional
    verify: e2e
    platforms: [ios, android]
    severity: high
    given: a user who has just reported a flagged message
    when: they open the Reports tab
    then: the report is listed with a status badge
    tags: [report, journey]

  # Phase 2: Scam awareness feed (advisories about emerging trends).
  - id: SCAM-ALERT-001
    title: The alerts endpoint returns scam advisories
    category: functional
    verify: integration
    severity: medium
    given: the running API
    when: a client GETs /alerts
    then: it responds 200 with a list of advisories, each having a title, body, category, and date
    tags: [alerts]

  - id: SCAM-ALERT-002
    title: The Alerts tab renders advisories
    category: ui
    verify: component
    severity: low
    given: the Alerts screen with advisories available
    when: it loads
    then: it renders the advisory cards

  # Phase 2: native call screening. The block decision is unit-tested in JS (the
  # native Kotlin service mirrors it). The on-device OS-level screening is a
  # verify: native requirement, proven by a signed artifact from an emulator run
  # (see verification/ and docs/MOBILE.md). iOS Call Directory + Message Filter
  # extensions ship as code but need a real device + Apple signing to verify, so
  # they are documented in docs/MOBILE.md, not gated here.
  - id: SCAM-NATIVE-001
    title: The block decision matches the synced scam blocklist
    category: data
    verify: unit
    severity: high
    given: the synced scam-number blocklist
    when: a number is checked against it (ignoring formatting)
    then: known scam numbers are blocked and others are not

  # Phase 3: admin verification dashboard (the "police verify reported scams"
  # surface). Reports stay pending until a human reviews them; the review sets the
  # authoritative status and notifies the reporter.
  - id: SCAM-ADMIN-001
    title: An admin can list all reports with suggestion and status
    category: functional
    verify: integration
    severity: high
    given: the running API with an admin token and some reports
    when: the admin GETs /admin/reports with the token
    then: it returns every report with its suggestedVerdict and status
    tags: [admin]

  - id: SCAM-ADMIN-002
    title: An admin verifies a report, setting its status and notifying the reporter
    category: functional
    verify: integration
    severity: critical
    given: a pending report with a device token
    when: the admin PATCHes /admin/reports/:id with a verdict of scam
    then: the report status becomes scam and the reporter is notified
    tags: [admin, journey]

  - id: SCAM-ADMIN-003
    title: Admin endpoints require a valid token
    category: security
    verify: integration
    severity: critical
    given: the admin endpoints
    when: a request arrives with no token or a wrong token
    then: it is rejected (403) and no data is returned or changed

  - id: SCAM-ADMIN-004
    title: An admin reviews a report in the dashboard
    category: functional
    verify: e2e
    severity: high
    given: the admin dashboard signed in with the token
    when: the admin marks a pending report as scam
    then: the row reflects the new status
    tags: [admin, journey]

  # Phase 3: email scam channel (report phishing emails).
  - id: SCAM-EMAIL-001
    title: User can check a suspicious email and see a verdict
    category: functional
    verify: e2e
    platforms: [ios, android]
    severity: high
    given: the user is on the Check screen in Email mode
    when: they paste a phishing email and tap Check
    then: a verdict is shown
    tags: [email, journey]

  - id: SCAM-EMAIL-002
    title: The email heuristic flags a spoofed-sender lure
    category: data
    verify: unit
    severity: medium
    given: the offline email heuristic
    when: it scores an email whose sender uses a lookalike domain
    then: it returns verdict scam

  # Phase 3: awareness stats + similar-report clustering.
  - id: SCAM-STATS-001
    title: The stats endpoint returns usage counters
    category: functional
    verify: integration
    severity: low
    given: the running API
    when: a client GETs /stats
    then: it returns numeric checks, reports, and confirmedScams counters
    tags: [stats]

  - id: SCAM-CLUSTER-001
    title: Similar reports cluster and surface a reported count
    category: functional
    verify: integration
    severity: medium
    given: two reports of content sharing a scam link domain
    when: a client checks content with that domain
    then: the check response includes a reportedCount of at least 2
    tags: [stats]

  - id: SCAM-STATS-002
    title: The stats strip renders the usage counters
    category: ui
    verify: component
    severity: low
    given: the stats strip with counter values
    when: it renders
    then: it shows the formatted counts

  # Phase 3: in-app link/scam warning (Q2 2025 warning screens).
  - id: SCAM-WARN-001
    title: A flagged verdict with a link shows a do-not-tap warning
    category: ui
    verify: component
    severity: medium
    given: the Check screen
    when: a checked message is flagged and contains a link
    then: a prominent "do not tap links" warning is shown

  # Phase 3b: spam outcome + conversational outcome labels + AI attribution,
  # mirroring the real ScamShield's four message outcomes.
  - id: SCAM-CLASSIFY-003
    title: Unsolicited promotional content is classified as spam
    category: data
    verify: unit
    severity: medium
    given: the offline heuristic
    when: it scores promotional content with no phishing lure
    then: it returns verdict spam (distinct from scam)

  - id: SCAM-VERDICT-001
    title: The verdict card shows a conversational label and AI attribution
    category: ui
    verify: component
    severity: low
    given: a verdict card for a spam result
    when: it renders
    then: it shows a conversational outcome label, the scam-vs-spam note, and an AI attribution

  # Phase 3: real LLM classifier integration (key-gated, deterministic default).
  - id: SCAM-CLASSIFY-002
    title: The classifier uses the LLM when configured and falls back on error
    category: functional
    verify: integration
    severity: high
    given: a configured classifier endpoint
    when: the service classifies a message, and separately when the endpoint errors
    then: the model verdict is used when available, otherwise the heuristic fallback is used
