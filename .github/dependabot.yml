version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Group minor + patch so the noise is one or two PRs. Majors are suppressed
    # by the ignore rules below (framework/toolchain majors are done deliberately,
    # not auto-merged), so they no longer come through as individual PRs.
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      production-dependencies:
        dependency-type: "production"
        update-types: ["minor", "patch"]
    ignore:
      # Expo SDK set: Expo 51 is locked to React Native 0.74 + React 18.2. Upgrade
      # them together via the Expo upgrade guide (`expo install --fix`), never
      # piecemeal, or the app build breaks.
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      # react-native is 0.x: a "minor" bump (0.74 -> 0.85) is breaking. Keep it on
      # the Expo-aligned 0.74.x line; only patches flow automatically.
      - dependency-name: "react-native"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
      # NestJS packages must share a major; upgrade the whole set deliberately.
      - dependency-name: "@nestjs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@codegenie/serverless-express"
        update-types: ["version-update:semver-major"]
      # Toolchain majors: take deliberately, not as auto-merges.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # The CDK packages are standalone (own package.json + lockfile), not part of
  # the root workspaces, so they need their own entries. The root "/" entry
  # above covers the workspaces (apps/_demo, services/_template, packages/spec-test).
  - package-ecosystem: "npm"
    directory: "/infra/cdk/_setup"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/infra/cdk/_template"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
