name: app-test

# Tests the real scamshield app + API (the platform ci.yml only self-tests the
# template scaffolds). Three jobs: fast JS layers (jest + vitest), the real
# Android-emulator Maestro e2e, then a merged spec-coverage report.
on:
  push:
    branches: [main]
  pull_request:

env:
  COV: results.jsonl

jobs:
  js-spec:
    name: JS layers (jest-expo + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run -w @platform/spec-test build
      - name: Unit + component (jest-expo)
        run: npm run test:unit -w @app/scamshield
        env:
          SPEC_COVERAGE_FILE: ${{ github.workspace }}/.spec-coverage/${{ env.COV }}
      - name: API integration (vitest)
        run: npm test -w @service/scamshield-api
        env:
          SPEC_COVERAGE_FILE: ${{ github.workspace }}/.spec-coverage/${{ env.COV }}
      - name: Upload JS coverage
        uses: actions/upload-artifact@v4
        with:
          name: cov-js
          path: .spec-coverage/${{ env.COV }}
          if-no-files-found: error

  e2e-android:
    name: Maestro e2e (Android emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: npm ci
      - run: npm run -w @platform/spec-test build
      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Allow cleartext to the local API (e2e build only)
        # Production app.json keeps usesCleartextTraffic:false (HTTPS-only). The
        # e2e talks to a local http://localhost:3000 API, so permit cleartext just
        # for this build. Without this, fetch is blocked and the report journey
        # cannot reach the API (and check silently falls back to the offline
        # heuristic, masking the API path).
        run: |
          node -e "const fs=require('fs');const p='apps/app/app.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.expo.android.usesCleartextTraffic=true;fs.writeFileSync(p,JSON.stringify(j,null,2))"
      - name: Prebuild Android project
        working-directory: apps/app
        run: npx expo prebuild --platform android --no-install
      - name: Confirm cleartext applied to the manifest
        run: |
          grep -q 'usesCleartextTraffic="true"' apps/app/android/app/src/main/AndroidManifest.xml \
            && echo "cleartext: enabled" \
            || { echo "cleartext NOT in manifest"; exit 1; }
      - name: Build release APK (JS bundled)
        # A debug APK expects a Metro dev server for the JS bundle; in CI there is
        # none, so the app would launch to an error screen and Maestro finds no UI.
        # The release APK embeds the JS bundle. Expo prebuild defaults the release
        # signingConfig to the debug keystore, so it installs on the emulator.
        # EXPO_PUBLIC_API_URL is inlined here: 10.0.2.2 is the emulator's alias for
        # the host loopback, where the API runs (more reliable than adb reverse).
        working-directory: apps/app/android
        env:
          EXPO_PUBLIC_API_URL: http://10.0.2.2:3000
        run: ./gradlew assembleRelease
      - name: Build API (for the report journey)
        run: npm run build -w @service/scamshield-api
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: Run Maestro on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          SPEC_COVERAGE_FILE: ${{ github.workspace }}/.spec-coverage/${{ env.COV }}
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            # Start the real API on the host:3000. The app reaches it at
            # http://10.0.2.2:3000 (emulator alias for the host loopback), so the
            # report journey (UI -> API enqueues -> reportId -> confirmation) runs
            # end to end, not stubbed.
            node services/api/dist/main.js &
            for i in $(seq 1 30); do curl -sf http://localhost:3000/health && break; sleep 1; done
            adb install -r apps/app/android/app/build/outputs/apk/release/app-release.apk
            (cd apps/app && maestro test .maestro --format junit --output maestro.xml)
            node packages/spec-test/dist/maestro.js --report apps/app/maestro.xml
      - name: Upload e2e coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cov-e2e
          path: .spec-coverage/${{ env.COV }}
          if-no-files-found: warn

  gate:
    name: Spec coverage (merged)
    runs-on: ubuntu-latest
    needs: [js-spec, e2e-android]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run -w @platform/spec-test build
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge coverage
        run: |
          mkdir -p .spec-coverage
          cat artifacts/cov-*/${{ env.COV }} > .spec-coverage/${{ env.COV }} 2>/dev/null || true
          echo "merged $(wc -l < .spec-coverage/${{ env.COV }}) coverage rows"
      - name: Spec coverage report
        # Informational: the strict 100% gate blocks at DEPLOY time. Here we report
        # the number and let it pass even though SCAM-SEC-001 (manual, needs a
        # signed real-device bundle inspection) keeps coverage below 100.
        run: |
          node packages/spec-test/dist/cli.js --spec specs/scamshield.yml \
            --coverage .spec-coverage/${{ env.COV }} \
            --verification-dir verification --app-version 0.1.0 \
            --out spec-coverage.md || true
          echo "## Spec coverage" >> "$GITHUB_STEP_SUMMARY"
          cat spec-coverage.md >> "$GITHUB_STEP_SUMMARY"
