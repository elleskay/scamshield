name: deploy-web

# Builds the Expo app for web (react-native-web) pointed at the live API and
# publishes it to GitHub Pages. This is the clickable demo: a browser URL that
# runs the real check-and-report UI against the deployed API.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Export web build
        working-directory: apps/app
        env:
          # Live API the demo talks to (repo variable). Public URL, no secrets.
          EXPO_PUBLIC_API_URL: ${{ vars.DEMO_API_URL }}
        run: npx expo export --platform web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
